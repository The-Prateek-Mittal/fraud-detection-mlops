name: "CI — Train, Test and Build"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Start MLflow in background
        run: |
          mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlflow-artifacts &
          sleep 8

      - name: Train model
        run: python src/train.py
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000

      - name: Upload models folder
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Build Docker image
        run: |
          cp models/scaler.pkl scaler.pkl 2>/dev/null || touch scaler.pkl
          docker build -t fraud-detection:latest .

      - name: CI complete
        run: echo "CI complete — image built, models saved"
